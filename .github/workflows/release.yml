name: release

# Trigger only on version tags — push v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build binaries (GCC, Release)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ \
            qemu-system-x86 qemu-utils busybox-static cpio gzip

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: hypercore-binaries
          path: |
            build/bin/hypercored
            build/bin/hypercore
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build the bootable ISO
  # ─────────────────────────────────────────────────────────────────────────
  iso:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            squashfs-tools cpio gzip busybox-static \
            grub-common grub-pc-bin grub-efi-amd64-bin \
            xorriso qemu-system-x86

      # Install the kernel package for the exact running kernel so that a
      # real vmlinuz lands in /boot. linux-image-generic is a meta-package
      # that doesn't reliably drop the image file on Azure-hosted runners.
      - name: Install kernel image
        run: |
          sudo apt-get install -y --no-install-recommends \
            "linux-image-$(uname -r)" || \
          sudo apt-get install -y --no-install-recommends \
            linux-image-generic
          ls -lh /boot/vmlinuz-* 2>/dev/null || { echo "ERROR: no vmlinuz in /boot"; ls /boot/; exit 1; }

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: hypercore-binaries
          path: build/bin

      - name: Fix binary permissions
        run: chmod +x build/bin/hypercored build/bin/hypercore

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Locate kernel
        run: |
          # Prefer exact running-kernel vmlinuz; fall back to newest in /boot.
          KERNEL_PATH="/boot/vmlinuz-$(uname -r)"
          if [ ! -r "$KERNEL_PATH" ]; then
            KERNEL_PATH="$(find /boot -maxdepth 1 -name 'vmlinuz-*' -type f | sort -V | tail -1)"
          fi
          if [ -z "$KERNEL_PATH" ] || [ ! -r "$KERNEL_PATH" ]; then
            echo "ERROR: no readable kernel found. /boot contents:"
            ls -lh /boot/
            exit 1
          fi
          echo "Using kernel: $KERNEL_PATH"
          echo "KERNEL_PATH=$KERNEL_PATH" >> "$GITHUB_ENV"

      - name: Build ISO
        run: |
          mkdir -p build
          ./iso-builder/build_iso.sh \
            --build-dir build \
            --kernel "$KERNEL_PATH" \
            --out "build/hypercore-${{ env.VERSION }}-x86_64.iso"

      - name: SHA-256 checksum
        run: |
          cd build
          sha256sum "hypercore-${{ env.VERSION }}-x86_64.iso" \
            > "hypercore-${{ env.VERSION }}-x86_64.iso.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: hypercore-iso
          path: |
            build/hypercore-${{ env.VERSION }}-x86_64.iso
            build/hypercore-${{ env.VERSION }}-x86_64.iso.sha256
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Create GitHub Release and attach the ISO
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: iso
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: hypercore-iso
          path: dist/

      - name: Create GitHub Release and upload assets
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "hypercore ${{ github.ref_name }}" \
            --notes "## hypercore ${{ github.ref_name }}

          A developer-first, Type-1 hypervisor that boots headless from a USB into a minimal Linux + KVM/QEMU environment.

          ### What's in the ISO
          - Custom PID 1 (\`hypercore-init\`) → mounts squashfs root and \`switch_root\`s into it
          - \`hypercored\` daemon — KVM/QEMU launch, CPU pinning, health checks, Unix control socket
          - \`hypercore\` CLI — \`list\`, \`start\`, \`stop\`, \`logs\`, \`ssh\`, live TTY dashboard
          - Bundled QEMU, busybox, default \`hypervisor.cfg\`
          - Hybrid BIOS/UEFI boot via GRUB (normal + \`hypercore.debug\` recovery entry)

          ### Flash to USB
          **Linux/macOS**
          \`\`\`sh
          sudo dd if=hypercore-${{ env.VERSION }}-x86_64.iso of=/dev/sdX bs=4M status=progress oflag=sync
          \`\`\`
          **Windows** — open Rufus, select the ISO, choose **DD Image** mode, write.

          ### Verify integrity
          \`\`\`sh
          sha256sum -c hypercore-${{ env.VERSION }}-x86_64.iso.sha256
          \`\`\`

          See [docs/iso.md](docs/iso.md) for full flashing and test-boot instructions." \
            "dist/hypercore-${{ env.VERSION }}-x86_64.iso" \
            "dist/hypercore-${{ env.VERSION }}-x86_64.iso.sha256"
