name: ci

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          # qemu-utils gives us busybox-independent tooling; qemu-system-x86 +
          # busybox let the test-guest builder and integration tests RUN if the
          # runner happens to have /dev/kvm. Standard GitHub-hosted runners do
          # NOT expose /dev/kvm, so the integration tests will SKIP (not fail)
          # via their capability gate — that is the intended behavior.
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build qemu-system-x86 qemu-utils busybox-static cpio gzip

      - name: Show host capabilities
        run: |
          ls -l /dev/kvm || echo "no /dev/kvm on this runner (integration will skip)"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        # Integration tests self-skip (return 77) without /dev/kvm; unit and
        # smoke tests always run. A skipped test is not a failure.
        run: ctest --test-dir build --output-on-failure

  format-and-lint:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          # Non-fatal for now: report diffs but do not gate the build until the
          # source surface stabilizes. Flip to `--dry-run --Werror` to enforce.
          find src cli common libconfig libcore tests -name '*.cpp' -o -name '*.hpp' \
            | xargs clang-format --dry-run || true
