# Minimal config fixture for the daemon end-to-end dry-run test.
#
# Deliberately conservative so it validates on ANY host (CI runners have as few
# as 2 cores): a single guest pinned to core 0 with modest RAM. Richer,
# host-specific examples live in ../../config/hypervisor.cfg.

[vm.hello]
image = "/var/lib/hypercore/images/hello.qcow2"
disk_type = "qcow2"
cpus = [0]
memory = "256M"
network = "user"
restart = "never"
