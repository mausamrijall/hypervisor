# hypercore default configuration.
#
# Format: TOML (see docs/schema.md for the full schema and validation rules).
# This file is intentionally close to a real deployment so it doubles as a
# worked example. Nothing here is launched until Phase 3.
#
# NOTE: The parser (Phase 2) and the runtime engine (Phase 3) are not yet
# implemented. This file defines the target schema we are building toward.

# ---------------------------------------------------------------------------
# Global daemon settings.
# ---------------------------------------------------------------------------
[hypercore]
# Control socket the CLI connects to.
socket = "/run/hypercore.sock"
# Where guest disk images / config live by default (per-VM paths may override).
state_dir = "/var/lib/hypercore"
log_level = "info"     # trace|debug|info|warn|error
log_format = "logfmt"  # logfmt|json

# ---------------------------------------------------------------------------
# Per-VM definitions. Each [vm.<name>] table declares one guest.
# v1 supports Linux guests only (virtio drivers). Windows/FreeBSD are out of
# scope and will be flagged explicitly if requested — not silently added.
# ---------------------------------------------------------------------------
[vm.web]
image = "/var/lib/hypercore/images/web.qcow2"
disk_type = "qcow2"          # raw | qcow2
cpus = [2, 3]                # explicit core list -> pinned via sched_setaffinity
memory = "2G"                # accepts K/M/G suffixes
network = "bridge"           # bridge | user | virtiofs (see [vm.web.share])
restart = "on-failure"       # never | on-failure | always
guest_agent = "/run/hypercore/web.agent.sock"

[vm.build]
image = "/var/lib/hypercore/images/build.raw"
disk_type = "raw"
cpus = [4, 5, 6, 7]
memory = "8G"
network = "user"
restart = "always"
guest_agent = "/run/hypercore/build.agent.sock"

# A virtiofs share exposes a host directory to the guest. Only meaningful when
# a VM wants shared storage in addition to (or instead of) bridged/user net.
[vm.build.share]
tag = "src"                  # mount tag inside the guest
host_path = "/home/dev/src"
readonly = false
